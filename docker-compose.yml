version: '3.8'
services:
  backend:
    build: ./backend
    container_name: crewboard-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - POSTGRES_URL=postgresql+asyncpg://crewboard:crewboard@db:5432/crewboard
      - SECRET_KEY=test_secret_key
    volumes:
      # For development with hot reload, mount backend to /app/backend
      - ./backend:/app/backend
    depends_on:
      - db
  # frontend:
  #   build: ./frontend
  #   container_name: crewboard-frontend
  #   ports:
  #     - "5173:5173"
  #   environment:
  #     - NODE_ENV=production
  #   volumes:
  #     - ./frontend:/app
  db:
    image: postgres:16-alpine
    container_name: crewboard-db
    environment:
      POSTGRES_USER: crewboard
      POSTGRES_PASSWORD: crewboard
      POSTGRES_DB: crewboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
